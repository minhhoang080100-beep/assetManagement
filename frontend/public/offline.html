<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QLTS - Ngoai tuyen</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dang ngoai tuyen</h1>
      <p>Ung dung can ket noi mang de dang nhap va dong bo du lieu. Hay kiem tra ket noi roi tai lai trang.</p>
    </main>
  </body>
</html>
